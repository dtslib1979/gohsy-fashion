<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOHSY — Fashion Commerce</title>
  <meta name="description" content="gohsy.com — 패션 커머스 쇼룸. 4채널 루프백 아키텍처.">
  <meta name="theme-color" content="#0F0F0F">
  <meta property="og:type" content="website">
  <meta property="og:title" content="GOHSY — Fashion Commerce">
  <meta property="og:description" content="패션 커머스 쇼룸 — 쿠팡 · 네이버 · YouTube · gohsy.com">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0F0F0F;
      --surface: #1A1A2E;
      --accent: #E94560;
      --text: #F5F5F5;
      --dim: rgba(245,245,245,0.5);
    }
    body {
      font-family: -apple-system, system-ui, 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .brand { font-size: 3rem; font-weight: 800; letter-spacing: 0.2em; margin-bottom: 0.5rem; }
    .brand span { color: var(--accent); }
    .tagline { font-size: 1rem; color: var(--dim); margin-bottom: 3rem; }
    .channels {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      max-width: 600px;
      width: 100%;
      margin-bottom: 3rem;
    }
    @media (max-width: 500px) { .channels { grid-template-columns: repeat(2, 1fr); } }
    .ch {
      background: var(--surface);
      border-radius: 12px;
      padding: 1.5rem 1rem;
      transition: transform 0.2s;
    }
    .ch:hover { transform: translateY(-4px); }
    .ch-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .ch-name { font-size: 0.75rem; font-weight: 600; }
    .ch-status { font-size: 0.65rem; color: var(--dim); margin-top: 0.3rem; }
    .status-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.4rem 1rem;
      border: 1px solid var(--accent);
      border-radius: 100px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }
    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.65rem;
      color: var(--dim);
    }
  </style>
</head>
<body>
  <div class="brand">GO<span>H</span>SY</div>
  <p class="tagline">Fashion Commerce HQ — 4-Channel Loopback</p>

  <div class="channels">
    <div class="ch">
      <div class="ch-icon">🛒</div>
      <div class="ch-name">Coupang</div>
      <div class="ch-status">준비 중</div>
    </div>
    <div class="ch">
      <div class="ch-icon">🟢</div>
      <div class="ch-name">Naver</div>
      <div class="ch-status">준비 중</div>
    </div>
    <div class="ch">
      <div class="ch-icon">▶️</div>
      <div class="ch-name">YouTube</div>
      <div class="ch-status">준비 중</div>
    </div>
    <div class="ch">
      <div class="ch-icon">🏠</div>
      <div class="ch-name">Showroom</div>
      <div class="ch-status">준비 중</div>
    </div>
  </div>

  <a href="showroom/" style="display:inline-block;padding:0.8rem 2rem;background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;font-size:0.9rem;font-weight:600;margin-bottom:1.5rem;transition:filter 0.2s" onmouseover="this.style.filter='brightness(1.2)'" onmouseout="this.style.filter='none'">Showroom 입장</a>

  <div style="font-size:0.7rem;color:var(--dim);margin-bottom:2rem">3 products · SPEC_READY</div>

  <div class="footer">gohsy-fashion · slot #9 · DTSLIB HQ</div>
</body>
</html>
