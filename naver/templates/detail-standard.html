<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{name}} — gohsy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; color: #222; background: #fff; max-width: 860px; margin: 0 auto; }

  /* Naver 스마트스토어 최적화: 깔끔한 화이트 톤, 간결한 정보 구성 */

  .hero { width: 100%; text-align: center; }
  .hero img { width: 100%; height: auto; display: block; }

  .info-bar { padding: 24px 20px; }
  .info-bar .brand { font-size: 12px; color: #00C73C; font-weight: 600; }
  .info-bar h1 { font-size: 20px; font-weight: 700; margin: 8px 0; line-height: 1.4; }
  .info-bar .price { font-size: 26px; font-weight: 800; color: #222; }
  .info-bar .price-retail { font-size: 14px; color: #aaa; text-decoration: line-through; margin-left: 8px; }
  .info-bar .discount { font-size: 26px; font-weight: 800; color: #f43142; margin-right: 8px; }
  .info-bar .season { display: inline-block; font-size: 11px; background: #f0faf0; padding: 3px 10px; border-radius: 4px; color: #00C73C; margin-top: 8px; }

  .naver-benefits { padding: 16px 20px; background: #f9f9f9; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
  .naver-benefits .benefit { font-size: 13px; color: #555; padding: 4px 0; }
  .naver-benefits .benefit em { color: #00C73C; font-style: normal; font-weight: 600; }

  .options { padding: 20px; }
  .options h3 { font-size: 13px; color: #666; margin-bottom: 10px; font-weight: 600; }
  .size-chip { display: inline-block; border: 1px solid #ddd; padding: 8px 18px; border-radius: 4px; font-size: 13px; margin: 0 4px 6px 0; cursor: pointer; }
  .color-chip { display: inline-block; padding: 8px 16px; border-radius: 20px; font-size: 12px; background: #f5f5f5; margin: 0 4px 6px 0; text-transform: capitalize; }

  .section-title { font-size: 16px; font-weight: 700; padding: 24px 20px 12px; color: #222; border-top: 8px solid #f5f5f5; }

  .detail-image { width: 100%; }
  .detail-image img { width: 100%; height: auto; display: block; }

  .spec-section { padding: 20px; }
  .spec-table { width: 100%; border-collapse: collapse; }
  .spec-table th { text-align: left; padding: 12px; background: #fafafa; border: 1px solid #eee; font-size: 13px; color: #666; width: 90px; font-weight: 400; }
  .spec-table td { padding: 12px; border: 1px solid #eee; font-size: 13px; }

  .cad-section { padding: 20px; text-align: center; background: #fafafa; }
  .cad-section img { max-width: 100%; height: auto; }

  .tags { padding: 16px 20px; font-size: 12px; color: #999; }

  .detail-footer { padding: 24px 20px; text-align: center; background: #222; color: #fff; }
  .detail-footer .brand-name { font-size: 16px; font-weight: 600; letter-spacing: 2px; }
  .detail-footer .links { margin-top: 8px; font-size: 12px; }
  .detail-footer a { color: #aaa; text-decoration: none; }

  /* 네이버 상세 이미지 가이드: 너비 860px 권장 */
</style>
</head>
<body>

<div class="hero">
  <img src="{{main_image}}" alt="{{name}}">
</div>

<div class="info-bar">
  <div class="brand">gohsy</div>
  <h1>{{name}}</h1>
  <div>
    <span class="price">{{price_naver}}</span>
    <span class="price-retail">{{price_retail}}</span>
  </div>
  <span class="season">{{season}}</span>
</div>

<div class="naver-benefits">
  <div class="benefit"><em>네이버페이</em> 결제 시 포인트 적립</div>
  <div class="benefit"><em>무료배송</em> · 당일출고</div>
</div>

<div class="options">
  <h3>사이즈 선택</h3>
  <div>{{sizes}}</div>
  <h3 style="margin-top:16px">컬러 선택</h3>
  <div>{{colors}}</div>
</div>

<h2 class="section-title">상세정보</h2>
<div class="detail-section">
{{detail_images}}
</div>

<div class="detail-image">
  <img src="{{lookbook_image}}" alt="{{name}} 룩북" loading="lazy">
</div>

<h2 class="section-title">상품정보</h2>
<div class="spec-section">
  <table class="spec-table">
{{spec_table}}
  </table>
</div>

<div class="cad-section">
  <img src="{{cad_image}}" alt="{{name}} 도면">
</div>

<div class="tags">{{tags}}</div>

<div class="detail-footer">
  <div class="brand-name">GOHSY</div>
  <div class="links"><a href="{{showroom_url}}">gohsy.com 쇼룸</a></div>
</div>

</body>
</html>
